<!DOCTYPE html>
<html>
<head>
    <title>Server Test</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: monospace;
            padding: 40px;
            font-size: 24px;
        }
        .success {
            color: #0f0;
            font-size: 48px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="success">✅ SERVER IS WORKING!</div>
    <p>If you see this, the dev server is running correctly.</p>
    <p>Time: <span id="time"></span></p>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleTimeString();
        console.log('Test page loaded successfully at', new Date());
    </script>
</body>
</html>
