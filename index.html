<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="602995" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  <title>FretPilot Trainer v2.0</title>
    
    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX'); // Replace with your GA4 Measurement ID
      
      // Google Ads conversion tracking
      gtag('config', 'AW-XXXXXXXXXX'); // Replace with your Google Ads Conversion ID
    </script>
    
    <style>
      /* Prevent layout shift by forcing scrollbar from the start */
      html {
        overflow-y: scroll !important;
        scrollbar-gutter: stable !important;
      }
      /* Hide content until loaded to prevent flash */
      #app {
        opacity: 0;
        transition: opacity 0.15s ease-in;
      }
      #app.loaded {
        opacity: 1;
      }
    </style>
    <script>
      // Host-based client redirect: Serve store for TheFranksStandard domain
      (function() {
        try {
          var host = window.location.hostname || '';
          var path = window.location.pathname || '/';
          if (/(^|\.)thefranksstandard\.com$/i.test(host) && !/^\/store(\/|\.html|$)/i.test(path)) {
            window.location.replace('/store.html');
          }
        } catch (_) { /* no-op */ }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
