<!doctype html>
<!-- deploy-bust: 2025-11-22T20:08Z -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="602995" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  <title>FretPilot Trainer v2.0</title>
    
    <!-- Dynamic GA4 injection via Vite env variable -->
    <!-- Set VITE_GA_MEASUREMENT_ID in .env (e.g. VITE_GA_MEASUREMENT_ID=G-XXXXXXX) before build/deploy -->
    <script type="module">
      const GA_ID = import.meta.env.VITE_GA_MEASUREMENT_ID;
      if (GA_ID) {
        const s = document.createElement('script');
        s.async = true;
        s.src = `https://www.googletagmanager.com/gtag/js?id=${GA_ID}`;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        window.gtag = gtag;
        gtag('js', new Date());
        gtag('config', GA_ID, {
          send_page_view: true,
            anonymize_ip: true,
            app_name: 'FretPilot Studio',
            app_version: '1.0.0'
        });
        window.trackEvent = (eventName, params = {}) => {
          try { gtag('event', eventName, params); } catch(_){}
        };
        window.addEventListener('load', () => {
          try { gtag('event', 'app_open', { method: 'web' }); } catch(_){}
        });
      } else {
        // Analytics disabled (no measurement ID). Provide no-op tracker to avoid errors.
        window.trackEvent = () => {};
      }
    </script>
    
    <style>
      /* Prevent layout shift by forcing scrollbar from the start */
      html {
        overflow-y: scroll !important;
        scrollbar-gutter: stable !important;
      }
      /* Hide content until loaded to prevent flash */
      #app {
        opacity: 0;
        transition: opacity 0.15s ease-in;
      }
      #app.loaded {
        opacity: 1;
      }
    </style>
    <script>
      // Host-based client redirect: Serve store for TheFranksStandard domain
      (function() {
        try {
          var host = window.location.hostname || '';
          var path = window.location.pathname || '/';
          if (/(^|\.)thefranksstandard\.com$/i.test(host) && !/^\/store(\/|\.html|$)/i.test(path)) {
            window.location.replace('/store.html');
          }
        } catch (_) { /* no-op */ }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
