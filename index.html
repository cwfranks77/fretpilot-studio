<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="602995" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
  <title>FretPilot Trainer v2.0</title>
    
    <!-- Google Analytics (gtag.js) -->
    <!-- Get your GA4 Measurement ID from: https://analytics.google.com/analytics/web/#/a{accountId}w{propertyId}p{streamId}/admin/streams/table/ -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FRETPILOT001"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      
      // GA4 Configuration
      gtag('config', 'G-FRETPILOT001', {
        'send_page_view': true,
        'anonymize_ip': true,
        'app_name': 'FretPilot Studio',
        'app_version': '1.0.0'
      });
      
      // Custom events for FretPilot
      window.trackEvent = function(eventName, params = {}) {
        gtag('event', eventName, params);
      };
      
      // Track app lifecycle
      window.addEventListener('load', () => {
        gtag('event', 'app_open', { method: 'web' });
      });
      
      // Google Ads conversion tracking (optional - add after creating Ads account)
      // gtag('config', 'AW-XXXXXXXXXX');
    </script>
    
    <style>
      /* Prevent layout shift by forcing scrollbar from the start */
      html {
        overflow-y: scroll !important;
        scrollbar-gutter: stable !important;
      }
      /* Hide content until loaded to prevent flash */
      #app {
        opacity: 0;
        transition: opacity 0.15s ease-in;
      }
      #app.loaded {
        opacity: 1;
      }
    </style>
    <script>
      // Host-based client redirect: Serve store for TheFranksStandard domain
      (function() {
        try {
          var host = window.location.hostname || '';
          var path = window.location.pathname || '/';
          if (/(^|\.)thefranksstandard\.com$/i.test(host) && !/^\/store(\/|\.html|$)/i.test(path)) {
            window.location.replace('/store.html');
          }
        } catch (_) { /* no-op */ }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
